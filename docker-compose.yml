services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 5s
      timeout: 5s
      retries: 5

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4318:4317"
    depends_on:
      - tempo
      - loki

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./loki.yaml:/etc/loki/loki.yaml:ro
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - tempo
      - loki
      - otel-collector

  mock-ntfn-provider:
    image: mockoon/cli:latest
    command: ["--data", "/data/config.json", "--port", "3001"]
    volumes:
      - ./mockoon/config.json:/data/config.json:ro
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 3s
      timeout: 3s
      retries: 3

  migrate-api:
    image: migrate/migrate
    volumes:
      - ./api/migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-c"]
    command: ["migrate -path=/migrations -database postgres://postgres:postgres@postgres:5432/api?sslmode=disable up"]
    depends_on:
      postgres:
        condition: service_healthy

  migrate-deliveryscheduler:
    image: migrate/migrate
    volumes:
      - ./deliveryscheduler/migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-c"]
    command: ["migrate -path=/migrations -database postgres://postgres:postgres@postgres:5432/deliveryscheduler?sslmode=disable up"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: api/.env
    ports:
      - "8080:8080"
    depends_on:
      migrate-api:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started

  processor:
    build:
      context: .
      dockerfile: processor/Dockerfile
    env_file: processor/.env
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      mock-ntfn-provider:
        condition: service_healthy
      otel-collector:
        condition: service_started

  deliveryscheduler:
    build:
      context: .
      dockerfile: deliveryscheduler/Dockerfile
    env_file: deliveryscheduler/.env
    depends_on:
      migrate-deliveryscheduler:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started
