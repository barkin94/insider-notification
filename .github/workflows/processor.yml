name: Processor

on:
  push:
    branches: [master]
    paths:
      - "processor/**"
      - ".golangci.yml"
      - ".github/workflows/processor.yml"
  pull_request:
    branches: [master]
    paths:
      - "processor/**"
      - ".golangci.yml"
      - ".github/workflows/processor.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: processor/go.mod
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-processor-${{ runner.os }}-${{ hashFiles('processor/go.sum') }}
          restore-keys: go-processor-${{ runner.os }}-

      - run: make install-tools
      - run: make lint-processor

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: processor/go.mod
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-processor-${{ runner.os }}-${{ hashFiles('processor/go.sum') }}
          restore-keys: go-processor-${{ runner.os }}-

      - run: make install-tools
      - run: make test-processor

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - run: make build-processor
