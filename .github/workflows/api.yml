name: API

on:
  push:
    branches: [master]
    paths:
      - "api/**"
      - "shared/**"
      - ".golangci.yml"
      - ".github/workflows/api.yml"
  pull_request:
    branches: [master]
    paths:
      - "api/**"
      - "shared/**"
      - ".golangci.yml"
      - ".github/workflows/api.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-api-${{ runner.os }}-${{ hashFiles('api/go.sum', 'shared/go.sum') }}
          restore-keys: go-api-${{ runner.os }}-

      - run: make install-tools
      - run: make lint-api

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-api-${{ runner.os }}-${{ hashFiles('api/go.sum', 'shared/go.sum') }}
          restore-keys: go-api-${{ runner.os }}-

      - run: make install-tools
      - run: make test-api

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - run: make build-api
